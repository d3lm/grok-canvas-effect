<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirecting…</title>
    <script>
      (() => {
        const { protocol, hostname, port, pathname, search, hash } = location;
        const segmentCount = 1;
        const origin = `${protocol}//${hostname}${port ? `:${port}` : ''}`;

        const base = pathname
          .split('/')
          .slice(0, 1 + segmentCount)
          .join('/');

        const route = pathname.slice(1).split('/').slice(segmentCount).join('/').replaceAll('&', '~and~');
        const query = search ? `&q=${search.slice(1).replaceAll('&', '~and~')}` : '';

        location.replace(`${origin}${base}/?p=/${route}${query}${hash}`);
      })();
    </script>
  </head>
  <body></body>
</html>
